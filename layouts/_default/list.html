{{ define "main" }}
<article class="section">
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  {{ with .Pages }}
  <ul class="post-list">
    {{ range .ByDate.Reverse }}
    <li>
      <a href="{{ .Permalink }}">{{ .Title }}</a>
      {{ with .Date }}<time datetime="{{ .Format "2006-01-02" }}">{{ .Format "Jan 2, 2006" }}</time>{{ end }}
    </li>
    {{ end }}
  </ul>
  {{ end }}
</article>
{{ end }}
